{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 mt-4">
      <div class="text-center mb-4">
        <span style="font-size:2.5rem;">🔗</span>
        <h3 class="fw-bold mt-2">Welcome Back!</h3>
        <p class="text-muted">Log in to ConnectHub</p>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-500">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-500">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
        </div>
        <button class="btn btn-primary w-100 py-2">Login</button>
      </form>
      <p class="text-center mt-3 text-muted">
        Don't have an account? <a href="/accounts/register/" class="text-primary fw-600">Register</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
