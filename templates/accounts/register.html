{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 mt-4">
      <div class="text-center mb-4">
        <span style="font-size:2.5rem;">🔗</span>
        <h3 class="fw-bold mt-2">Create Account</h3>
        <p class="text-muted">Join ConnectHub today</p>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-500">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Email</label>
          <input type="email" name="email" class="form-control" placeholder="your@email.com"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-500">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Create a password" required/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-500">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required/>
        </div>
        <button class="btn btn-primary w-100 py-2">Create Account</button>
      </form>
      <p class="text-center mt-3 text-muted">
        Already have an account? <a href="/accounts/login/" class="text-primary fw-600">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
